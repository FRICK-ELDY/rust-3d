name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  rust:
    name: Rust Lints & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (stable + clippy/rustfmt) with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 5
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            rustup toolchain install stable --profile minimal --no-self-update
            rustup component add --toolchain stable clippy rustfmt
            rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Cargo fetch
        run: cargo fetch

      - name: rustfmt (check)
        run: cargo fmt --all -- --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (debug)
        run: cargo build --workspace --all-targets

      - name: Tests (if any)
        run: cargo test --workspace --all-targets --no-fail-fast

  web-build:
    name: WASM build (Trunk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (stable + wasm) with retry
        uses: nick-invision/retry@v3
        with:
          max_attempts: 5
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            rustup toolchain install stable --profile minimal --no-self-update
            rustup default stable
            rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install trunk (retry)
        uses: nick-invision/retry@v3
        with:
          max_attempts: 5
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: cargo install trunk --locked

      - name: Build web (release)
        working-directory: platform/web
        run: trunk build --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: platform/web/dist
