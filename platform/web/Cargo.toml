[package]
name = "app_web"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
core   = { path = "../../core" }
render = { path = "../../render" }
winit = { version = "0.29", features = ["rwh_05"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
js-sys = "0.3"

web-sys = { version = "0.3", features = ["Window","Document","Element","HtmlCanvasElement","Response"] }
